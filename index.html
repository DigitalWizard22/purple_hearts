<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For MJ 💜</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1 class="pixel-text">Purple Hearts</h1>
            <p class="subtitle">para sa isa diyan na ginawang personality ang purple</p>
        </header>

        <main class="main-content">
            <div class="art-display">
                <canvas id="pixel-animation" width="96" height="96"></canvas>
            </div>

            <div class="player-container">
                <div class="now-playing">
                    <div class="track-details">
                        <div class="track-scroll-wrapper">
                            <h2 id="track-title"><span class="marquee-text" id="track-title-text">Select a Track</span></h2>
                        </div>
                        <div class="track-scroll-wrapper">
                            <p id="track-artist"><span class="marquee-text" id="track-artist-text">Artist Name</span></p>
                        </div>
                    </div>
                </div>

                <div class="player-controls">
                    <button id="prev-btn" class="control-btn"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" focusable="false"><rect x="2" y="1.5" width="2" height="13" fill="currentColor"/><path d="M14 1.5v13L4 8z" fill="currentColor"/></svg></button>
                    <button id="play-btn" class="control-btn"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" focusable="false"><path d="M3 1.5v13l11-6.5z" fill="currentColor"/></svg></button>
                    <button id="next-btn" class="control-btn"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" focusable="false"><path d="M2 1.5v13l10-6.5z" fill="currentColor"/><rect x="12" y="1.5" width="2" height="13" fill="currentColor"/></svg></button>
                </div>
            </div>

            <div class="playlist-section">
                <h3>Tracklist</h3>
                <ul id="playlist">
                    </ul>
            </div>

            <div class="spotify-wrapper">
                <iframe id="spotify-engine" src="" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </main>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
